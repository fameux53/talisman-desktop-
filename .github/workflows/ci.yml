name: Talisman CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════
  # JOB 1: Backend Lint (ruff)
  # ═══════════════════════════════════════
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check .

  # ═══════════════════════════════════════
  # JOB 2: Backend Tests (Python/FastAPI)
  # ═══════════════════════════════════════
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock', 'backend/pyproject.toml') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest -v --tb=short
        env:
          TESTING: "1"

  # ═══════════════════════════════════════
  # JOB 3: Frontend Tests (React/TypeScript)
  # ═══════════════════════════════════════
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose

      - name: Build check
        env:
          VITE_API_URL: https://talisman-desktop-production.up.railway.app
        run: npm run build

  # ═══════════════════════════════════════
  # JOB 4: Security Checks
  # ═══════════════════════════════════════
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          echo "=== Checking for hardcoded secrets ==="
          FOUND=$(grep -rn "sk-ant-\|password\s*=\s*[\"'][^\"']\+[\"']\|secret.*=.*[\"'][a-zA-Z0-9]\{20,\}[\"']" \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            backend/app/ frontend/src/ 2>/dev/null | grep -v "test\|example\|placeholder\|TODO\|\.env" || true)
          if [ -n "$FOUND" ]; then
            echo "Potential secrets found:"
            echo "$FOUND"
            echo "::warning::Potential hardcoded secrets detected"
          else
            echo "No hardcoded secrets found"
          fi

      - name: Check for dangerous patterns
        run: |
          echo "=== Checking for dangerous patterns ==="
          DANGEROUS=$(grep -rn "eval(\|dangerouslySetInnerHTML\|innerHTML\s*=\|document\.write\|exec(" \
            frontend/src/ --include="*.ts" --include="*.tsx" 2>/dev/null || true)
          if [ -n "$DANGEROUS" ]; then
            echo "Dangerous patterns found:"
            echo "$DANGEROUS"
            echo "::warning::Dangerous code patterns detected"
          else
            echo "No dangerous patterns found"
          fi

      - name: Check .env not committed
        run: |
          if [ -f "backend/.env" ] || [ -f "frontend/.env" ]; then
            echo "::error::.env file found in repository! Remove it and add to .gitignore"
            exit 1
          fi
          echo "No .env files committed"

  # ═══════════════════════════════════════
  # JOB 5: Code Quality
  # ═══════════════════════════════════════
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Lint check
        run: |
          cd frontend
          npx eslint src/ --max-warnings 0 2>/dev/null || echo "ESLint not fully configured - skipping"

      - name: Check for MarketMama references
        run: |
          # Exclude main.tsx (migration/backwards-compat code) and branding.test.ts (test that searches for the term)
          FOUND=$(grep -rn "MarketMama\|marketmama\|MARKETMAMA\|market_mama" \
            --include="*.ts" --include="*.tsx" --include="*.py" --include="*.json" \
            --exclude="main.tsx" --exclude="branding.test.ts" \
            frontend/src/ backend/app/ 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Old 'MarketMama' references found - should be 'Talisman':"
            echo "$FOUND"
            exit 1
          fi
          echo "No MarketMama references"

      - name: Check i18n key balance
        run: |
          cd frontend/src/i18n
          HT=$(grep -c '"' ht.json || echo 0)
          FR=$(grep -c '"' fr.json || echo 0)
          EN=$(grep -c '"' en.json || echo 0)
          echo "i18n keys - HT: $HT | FR: $FR | EN: $EN"
          if [ "$HT" != "$FR" ] || [ "$HT" != "$EN" ]; then
            echo "::warning::i18n keys are unbalanced! HT=$HT FR=$FR EN=$EN"
          else
            echo "All languages have $HT keys"
          fi
